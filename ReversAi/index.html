<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReversAi</title>
<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>ReversAi</h1>
<p class="algo-label">Alpha-Beta Pruning Algorithm</p>

<div class="scoreboard">
  <div class="score-item black">
    <div class="label">YOU (●)</div>
    <div class="num" id="black-score">2</div>
  </div>
  <div class="score-item white">
    <div class="label">AI (○)</div>
    <div class="num" id="white-score">2</div>
  </div>
</div>

<div id="status">Your turn! Click a dot to place your tile.</div>
<div id="board"></div>

<div class="stats">
  <div class="stat">
    <div class="s-label">Nodes Checked</div>
    <div class="s-val" id="stat-nodes">—</div>
  </div>
  <div class="stat">
    <div class="s-label">Branches Pruned</div>
    <div class="s-val red" id="stat-pruned">—</div>
  </div>
</div>

<div class="buttons">
  <button class="primary" onclick="resetGame()">New Game</button>
  <button onclick="toggleHints()">Toggle Hints</button>
</div>

<div id="game-over">
  <h2 id="go-title">YOU WIN!</h2>
  <p id="go-score"></p>
  <button class="primary" style="margin-top:8px" onclick="resetGame()">Play Again</button>
</div>

<script src="script.js"></script>
</body>
</html>
